# Action name
name: Snake Game

# Trigger configuration (when the workflow runs)
on:
  schedule:
    # Runs every 5 hours
    - cron: "0 */5 * * *"

  # Allows manual execution from the Actions tab
  workflow_dispatch:

# Jobs definition
jobs:
  build:
    # Runs on the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository so the workflow can access it
      - uses: actions/checkout@v4

      # Generate the snake animation based on GitHub contributions
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: biiab # Replace with your GitHub username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Check repository status (debugging/log purposes)
      - run: git status

      # Commit and push generated files
      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true

      # Deploy generated files to the "output" branch (GitHub Pages)
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          # Target branch for deployment
          target_branch: output
          # Directory containing generated files
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
